name: ML Model Test

"on" : [push]

jobs:
    run_model:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.10'
            
            - name: Install Dependencies
              run: |
                pip install numpy
            
            - name: Run Logistic Regression
              run: |
                python Logistic_scratch/example.py
